<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Draggable Ball</title>
    <link rel="stylesheet" href="https://fonts.roobert.com/roobert.css">
    <style>
        body {
            background-color: #0d0d0d;
        }
        #ball {
            width: 50px;
            height: 50px;
            background-color: #faf0e6;
            border-radius: 50%;
            position: absolute;
            cursor: move;
            display: flex;
            justify-content: center;
            align-items: center;
            color: black;
            font-weight: bold;
            font-size: 14px;
        }
        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 24px;
            font-family: 'Roobert', sans-serif;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="ball">0</div>
    <div id="message">Hi</div>
    <script>
        const ball = document.getElementById('ball');
        ball.textContent = '0';
        let isDragging = false;
        let offsetX, offsetY;
        let velocityY = 0;
        const gravity = 0.5;
        const bounce = 0.8;
        const ground = window.innerHeight - 50;
        let bounceCount = 0;
        let wasInAirLastFrame = true;

        function animate() {
            if (!isDragging) {
                velocityY += gravity;
                let top = ball.offsetTop + velocityY;
                if (top >= ground) {
                    top = ground;
                    if (velocityY > 0) {
                        velocityY *= -bounce;
                        if (wasInAirLastFrame) {
                            bounceCount++;
                            ball.textContent = bounceCount.toString();
                            if (bounceCount >= 100) {
                                document.getElementById('message').textContent = 'M';
                            }
                        }
                        if (Math.abs(velocityY) < 0.5) velocityY = 0;
                    }
                }
                ball.style.top = top + 'px';
                wasInAirLastFrame = (top < ground);
            }
            requestAnimationFrame(animate);
        }

        function startDrag(clientX, clientY) {
            isDragging = true;
            velocityY = 0;
            offsetX = clientX - ball.offsetLeft;
            offsetY = clientY - ball.offsetTop;
        }

        function moveDrag(clientX, clientY) {
            if (isDragging) {
                ball.style.left = clientX - offsetX + 'px';
                ball.style.top = clientY - offsetY + 'px';
            }
        }

        function endDrag() {
            isDragging = false;
        }

        // Mouse events
        ball.addEventListener('mousedown', (e) => {
            startDrag(e.clientX, e.clientY);
        });

        document.addEventListener('mousemove', (e) => {
            moveDrag(e.clientX, e.clientY);
        });

        document.addEventListener('mouseup', endDrag);

        // Touch events
        ball.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            startDrag(touch.clientX, touch.clientY);
        });

        document.addEventListener('touchmove', (e) => {
            if (isDragging) {
                e.preventDefault();
                const touch = e.touches[0];
                moveDrag(touch.clientX, touch.clientY);
            }
        });

        document.addEventListener('touchend', endDrag);

        animate();
    </script>
</body>
</html>
