<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Draggable Ball</title>
    <style>
        #ball {
            width: 50px;
            height: 50px;
            background-color: red;
            border-radius: 50%;
            position: absolute;
            cursor: move;
        }
    </style>
</head>
<body>
    <div id="ball"></div>
    <script>
        const ball = document.getElementById('ball');
        let isDragging = false;
        let offsetX, offsetY;
        let velocityY = 0;
        const gravity = 0.5;
        const bounce = 0.8;
        const ground = window.innerHeight - 50;

        function animate() {
            if (!isDragging) {
                velocityY += gravity;
                let top = ball.offsetTop + velocityY;
                if (top >= ground) {
                    top = ground;
                    velocityY *= -bounce;
                    if (Math.abs(velocityY) < 1) velocityY = 0;
                }
                ball.style.top = top + 'px';
            }
            requestAnimationFrame(animate);
        }

        function startDrag(clientX, clientY) {
            isDragging = true;
            velocityY = 0;
            offsetX = clientX - ball.offsetLeft;
            offsetY = clientY - ball.offsetTop;
        }

        function moveDrag(clientX, clientY) {
            if (isDragging) {
                ball.style.left = clientX - offsetX + 'px';
                ball.style.top = clientY - offsetY + 'px';
            }
        }

        function endDrag() {
            isDragging = false;
        }

        // Mouse events
        ball.addEventListener('mousedown', (e) => {
            startDrag(e.clientX, e.clientY);
        });

        document.addEventListener('mousemove', (e) => {
            moveDrag(e.clientX, e.clientY);
        });

        document.addEventListener('mouseup', endDrag);

        // Touch events
        ball.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            startDrag(touch.clientX, touch.clientY);
        });

        document.addEventListener('touchmove', (e) => {
            if (isDragging) {
                e.preventDefault();
                const touch = e.touches[0];
                moveDrag(touch.clientX, touch.clientY);
            }
        });

        document.addEventListener('touchend', endDrag);

        animate();
    </script>
</body>
</html>
