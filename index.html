<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Draggable Ball</title>
    <style>
        #ball {
            width: 50px;
            height: 50px;
            background-color: red;
            border-radius: 50%;
            position: absolute;
            cursor: move;
        }
    </style>
</head>
<body>
    <div id="ball"></div>
    <script>
        const ball = document.getElementById('ball');
        let isDragging = false;
        let offsetX, offsetY;
        let velocityY = 0;
        const gravity = 0.5;
        const bounce = 0.8;
        const ground = window.innerHeight - 50;

        function animate() {
            if (!isDragging) {
                velocityY += gravity;
                let top = ball.offsetTop + velocityY;
                if (top >= ground) {
                    top = ground;
                    velocityY *= -bounce;
                    if (Math.abs(velocityY) < 1) velocityY = 0;
                }
                ball.style.top = top + 'px';
            }
            requestAnimationFrame(animate);
        }

        ball.addEventListener('mousedown', (e) => {
            isDragging = true;
            velocityY = 0;
            offsetX = e.clientX - ball.offsetLeft;
            offsetY = e.clientY - ball.offsetTop;
        });

        document.addEventListener('mousemove', (e) => {
            if (isDragging) {
                ball.style.left = e.clientX - offsetX + 'px';
                ball.style.top = e.clientY - offsetY + 'px';
            }
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
        });

        animate();
    </script>
</body>
</html>
